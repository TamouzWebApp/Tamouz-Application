<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="ScoutPluse">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ScoutPluse">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#10b981">
    <meta name="theme-color" content="#10b981">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    
    <title>ScoutPluse - Scout Management Platform</title>
    
    <!-- تحويل فوري إلى الصفحة الرئيسية -->
    <meta http-equiv="refresh" content="0; url=HTML/index.html">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .loading {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .redirect-link {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="logo">🏕️ ScoutPluse</div>
    <div class="loading">جاري التحويل إلى التطبيق... - Created by KinanKassab</div>
    <p>إذا لم يتم التحويل تلقائياً، <a href="HTML/index.html" class="redirect-link">اضغط هنا</a></p>
    
    <script>
        // تحويل فوري بـ JavaScript أيضاً
        setTimeout(() => {
            window.location.href = 'HTML/index.html';
        }, 1000);
        
        // تسجيل Service Worker للصفحة الرئيسية
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registered:', registration.scope);
                })
                .catch(error => {
                    console.log('❌ Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
